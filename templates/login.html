<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if admin_mode %}管理员登录{% else %}登录{% endif %} — 异动反馈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f5f5f5; display: flex; align-items: center;
         justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; padding: 40px;
          width: 360px; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
  h1 { font-size: 20px; margin-bottom: 24px; color: #111; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
  input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 15px; outline: none; }
  input[type=password]:focus { border-color: #4f46e5; }
  button { width: 100%; margin-top: 16px; padding: 11px;
           background: #4f46e5; color: #fff; border: none;
           border-radius: 8px; font-size: 15px; cursor: pointer; }
  button:hover { background: #4338ca; }
  .error { color: #dc2626; font-size: 13px; margin-top: 10px; }
  .sub { margin-top: 16px; font-size: 13px; color: #888; text-align: center; }
  .sub a { color: #4f46e5; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <h1>{% if admin_mode %}管理员登录{% else %}异动反馈系统{% endif %}</h1>
  <form method="post">
    <label>访问密码</label>
    <input type="password" name="password" autofocus placeholder="请输入密码">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <button type="submit">进入</button>
  </form>
  {% if not admin_mode %}
  <div class="sub"><a href="/admin/login">管理员入口</a></div>
  {% endif %}
</div>
</body>
</html>
