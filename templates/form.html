<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>提交异动反馈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f5f5f5; padding: 32px 16px; }
  .card { background: #fff; border-radius: 12px; padding: 36px;
          max-width: 520px; margin: 0 auto;
          box-shadow: 0 2px 16px rgba(0,0,0,.08); }
  h1 { font-size: 20px; margin-bottom: 28px; color: #111; }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
  label span { color: #dc2626; }
  input[type=text], input[type=time], select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 15px; outline: none;
    font-family: inherit; }
  input:focus, select:focus, textarea:focus { border-color: #4f46e5; }
  textarea { resize: vertical; min-height: 72px; }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
  .stock-wrap { position: relative; }
  .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff;
    border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px;
    z-index: 10; max-height: 200px; overflow-y: auto; display: none; }
  .dropdown-item { padding: 10px 12px; cursor: pointer; font-size: 14px; }
  .dropdown-item:hover { background: #f5f3ff; }
  .dropdown-item .code { color: #888; font-size: 12px; margin-left: 6px; }
  button[type=submit] { width: 100%; padding: 12px; background: #4f46e5;
    color: #fff; border: none; border-radius: 8px; font-size: 15px;
    cursor: pointer; margin-top: 8px; }
  button[type=submit]:hover { background: #4338ca; }
  .success { background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px;
    padding: 16px; color: #166534; margin-bottom: 20px; font-size: 14px; }
  .error-msg { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px;
    padding: 16px; color: #991b1b; margin-bottom: 20px; font-size: 14px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px; }
  .top-bar h1 { margin-bottom: 0; }
  .logout { font-size: 13px; color: #888; text-decoration: none; }
  .logout:hover { color: #4f46e5; }
  .type-btns { display: flex; gap: 10px; }
  .type-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
    background: #fff; cursor: pointer; font-size: 14px; text-align: center;
    transition: all .15s; }
  .type-btn.active-miss { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
  .type-btn.active-wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
  input[name=feedback_type] { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar">
    <h1>提交异动反馈</h1>
    <a href="/logout" class="logout">退出</a>
  </div>

  {% if success %}
  <div class="success">✓ 提交成功，感谢反馈！</div>
  {% endif %}
  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="post" action="/submit" autocomplete="off">
    <div class="field">
      <label>用户名 <span>*</span></label>
      <input type="text" name="username" value="{{ prefill.username if prefill else '' }}"
             placeholder="你的名字" required>
    </div>

    <div class="field">
      <label>股票 <span>*</span></label>
      <div class="stock-wrap">
        <input type="text" id="stock-input" placeholder="输入股票名称搜索..."
               value="{{ prefill.stock_name if prefill else '' }}" autocomplete="off">
        <div class="dropdown" id="dropdown"></div>
      </div>
      <input type="hidden" name="stock_name" id="stock_name"
             value="{{ prefill.stock_name if prefill else '' }}">
      <input type="hidden" name="stock_code" id="stock_code"
             value="{{ prefill.stock_code if prefill else '' }}">
      <div id="stock-selected" style="font-size:13px;color:#4f46e5;margin-top:4px;">
        {% if prefill and prefill.stock_code %}已选：{{ prefill.stock_name }}（{{ prefill.stock_code }}）{% endif %}
      </div>
    </div>

    <div class="field">
      <label>反馈类型 <span>*</span></label>
      <div class="type-btns">
        <div class="type-btn {% if prefill and prefill.feedback_type == '漏报' %}active-miss{% endif %}"
             onclick="setType('漏报', this)">漏报（应报未报）</div>
        <div class="type-btn {% if prefill and prefill.feedback_type == '错报' %}active-wrong{% endif %}"
             onclick="setType('错报', this)">错报（不该报却报了）</div>
      </div>
      <input type="hidden" name="feedback_type" id="feedback_type"
             value="{{ prefill.feedback_type if prefill else '' }}">
    </div>

    <div class="row">
      <div class="field">
        <label>开始时间 <span>*</span></label>
        <input type="time" name="time_start" min="09:30" max="15:00"
               value="{{ prefill.time_start if prefill else '09:30' }}" required>
      </div>
      <div class="field">
        <label>结束时间 <span>*</span></label>
        <input type="time" name="time_end" min="09:30" max="15:00"
               value="{{ prefill.time_end if prefill else '15:00' }}" required>
      </div>
    </div>

    <div class="field">
      <label>备注</label>
      <textarea name="note" placeholder="补充说明（可选）">{{ prefill.note if prefill else '' }}</textarea>
    </div>

    <button type="submit">提交反馈</button>
  </form>
</div>

<script>
let debounceTimer;
const input = document.getElementById('stock-input');
const dropdown = document.getElementById('dropdown');
const stockName = document.getElementById('stock_name');
const stockCode = document.getElementById('stock_code');
const selected = document.getElementById('stock-selected');

input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const q = input.value.trim();
  if (!q) { dropdown.style.display = 'none'; return; }
  debounceTimer = setTimeout(() => fetchStocks(q), 300);
});

async function fetchStocks(q) {
  const res = await fetch('/api/stock-search?q=' + encodeURIComponent(q));
  const data = await res.json();
  if (!data.length) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = data.map(s =>
    `<div class="dropdown-item" onclick="selectStock('${s.name}','${s.code}')">
      ${s.name}<span class="code">${s.code}</span>
    </div>`
  ).join('');
  dropdown.style.display = 'block';
}

function selectStock(name, code) {
  input.value = name;
  stockName.value = name;
  stockCode.value = code;
  selected.textContent = '已选：' + name + '（' + code + '）';
  dropdown.style.display = 'none';
}

document.addEventListener('click', e => {
  if (!e.target.closest('.stock-wrap')) dropdown.style.display = 'none';
});

function setType(type, el) {
  document.getElementById('feedback_type').value = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.remove('active-miss', 'active-wrong');
  });
  el.classList.add(type === '漏报' ? 'active-miss' : 'active-wrong');
}
</script>
</body>
</html>
